<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" type="image/x-icon">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="192x192" href="{{ '/assets/images/icon-192.png' | relative_url }}">
  <link rel="icon" type="image/png" sizes="512x512" href="{{ '/assets/images/icon-512.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% feed_meta %}
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo">
        <img src="{{ '/assets/images/diskball-logo.png' | relative_url }}" alt="Discball Logo" class="nav-logo-img">
        <span class="nav-logo-text">DISC<span>BALL</span></span>
      </a>

      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/rules' | relative_url }}" {% if page.nav_id == 'rules' %}class="active"{% endif %}>Rules</a></li>
        <li><a href="{{ '/ethos' | relative_url }}" {% if page.nav_id == 'ethos' %}class="active"{% endif %}>Ethos</a></li>
        <li><a href="{{ '/faq' | relative_url }}" {% if page.nav_id == 'faq' %}class="active"{% endif %}>FAQ</a></li>
      </ul>

      <button class="nav-mobile-toggle" onclick="document.getElementById('mobile-menu').classList.toggle('open')" aria-label="Toggle menu">
        <svg viewBox="0 0 24 24"><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
    </div>

    <div id="mobile-menu" class="nav-mobile-menu">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/rules' | relative_url }}" {% if page.nav_id == 'rules' %}class="active"{% endif %}>Rules</a>
      <a href="{{ '/ethos' | relative_url }}" {% if page.nav_id == 'ethos' %}class="active"{% endif %}>Ethos</a>
      <a href="{{ '/faq' | relative_url }}" {% if page.nav_id == 'faq' %}class="active"{% endif %}>FAQ</a>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-logo">
      <img src="{{ '/assets/images/diskball-logo.png' | relative_url }}" alt="Discball Logo" class="footer-logo-img">
      <span>DISCBALL</span>
    </div>
    <p class="footer-tagline">Dodgeball with a frisbee. No teams. No mercy.</p>
    <p class="footer-copyright">&copy; 2026 Intergalactic Discball Governing Body. All rights reserved.</p>
  </footer>

  <script>
  // FAQ accordion toggle
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.faq-toggle').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var item = this.closest('.faq-item');
        item.classList.toggle('open');
      });
    });
  });
  </script>

</body>
</html>
